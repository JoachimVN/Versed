name: Sync to Portfolio

# Builds the Versed client and publishes it to the portfolio repo (Vercel-deployed
# at joavn.dev), serving the app at joavn.dev/versed. Mirrors the pattern CHORIDOR-web
# and Music-Popularity-Index use.
# Requires a repo secret PORTFOLIO_TOKEN: a PAT with write access to JoachimVN/Portfolio.

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build client
        # The frontend is served under /versed/ and talks to the Railway backend.
        env:
          VITE_SERVER_URL: https://versed-production.up.railway.app
        run: npm run build -w client -- --base=/versed/

      - name: Clone portfolio repo
        env:
          PORTFOLIO_TOKEN: ${{ secrets.PORTFOLIO_TOKEN }}
        run: git clone "https://x-access-token:${PORTFOLIO_TOKEN}@github.com/JoachimVN/Portfolio.git" portfolio

      - name: Sync built client -> versed/
        run: |
          rm -rf portfolio/versed
          cp -r client/dist portfolio/versed

      - name: Commit and push
        run: |
          cd portfolio
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versed/
          git diff --staged --quiet || git commit -m "chore: sync Versed from Versed@${{ github.sha }}"
          git push
