<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 562" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#021c24" />
      <stop offset="50%" stop-color="#051429" />
      <stop offset="100%" stop-color="#190433" />
    </linearGradient>

    <linearGradient id="tealGlow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#006c75" />
      <stop offset="50%" stop-color="#00b4c4" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>

    <linearGradient id="purpleGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="40%" stop-color="#491375" />
      <stop offset="100%" stop-color="#8c12b3" />
    </linearGradient>

    <linearGradient id="coreGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="30%" stop-color="#86f3ff" stop-opacity="0.7" />
      <stop offset="70%" stop-color="#df8aff" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9" />
    </linearGradient>

    <filter id="glowIntense" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur1" />
      <feGaussianBlur stdDeviation="20" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="glowSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" result="blur" />
    </filter>
  </defs>

  <rect width="1000" height="562" fill="url(#bgGrad)" />

  <circle cx="200" cy="200" r="300" fill="#00798c" opacity="0.25" filter="url(#glowSoft)" />
  <circle cx="850" cy="400" r="350" fill="#6f1d9e" opacity="0.3" filter="url(#glowSoft)" />

  <g fill="none" stroke-linecap="round">
    
    <path d="M-100,450 C300,250 600,100 1100,50" stroke="url(#purpleGlow)" stroke-width="12" opacity="0.4" filter="url(#glowSoft)" />
    <path d="M1050,100 C800,200 400,150 -50,350" stroke="url(#tealGlow)" stroke-width="16" opacity="0.3" filter="url(#glowSoft)" />

    <path d="M-50,250 C400,-50 700,400 1050,150" stroke="url(#tealGlow)" stroke-width="6" filter="url(#glowIntense)" />
    <path d="M-50,250 C400,-50 700,400 1050,150" stroke="url(#coreGrad)" stroke-width="1.5" />

    <path d="M-100,530 C300,300 500,50 1050,300" stroke="url(#purpleGlow)" stroke-width="7" filter="url(#glowIntense)" />
    <path d="M-100,530 C300,300 500,50 1050,300" stroke="url(#coreGrad)" stroke-width="2" />

    <path d="M150,580 C400,300 700,330 900,580" stroke="url(#purpleGlow)" stroke-width="8" filter="url(#glowIntense)" />
    <path d="M150,580 C400,300 700,330 900,580" stroke="url(#coreGrad)" stroke-width="1.5" />

    <path d="M350,-50 C200,200 -50,450 100,600" stroke="url(#tealGlow)" stroke-width="5" filter="url(#glowIntense)" />
    <path d="M350,-50 C200,200 -50,450 100,600" stroke="url(#coreGrad)" stroke-width="1" />

  </g>
</svg>
