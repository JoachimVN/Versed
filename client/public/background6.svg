<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
    <defs>
        <linearGradient id="bg-grad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#002d38" />    <stop offset="50%" stop-color="#111638" />   <stop offset="100%" stop-color="#2d0b4e" />  </linearGradient>

        <linearGradient id="teal-wave-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#005f6b" />    <stop offset="40%" stop-color="#009ba4" />   <stop offset="80%" stop-color="#2b0057" />   <stop offset="100%" stop-color="#6a0dad" />  </linearGradient>

        <linearGradient id="purple-teal-twist" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#8010a3" />   <stop offset="45%" stop-color="#491070" />   <stop offset="85%" stop-color="#00808a" />   <stop offset="100%" stop-color="#004d54" />  </linearGradient>

        <radialGradient id="teal-glow" cx="15%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#00b4d8" stop-opacity="0.6" />
            <stop offset="100%" stop-color="#001233" stop-opacity="0" />
        </radialGradient>

        <radialGradient id="purple-glow" cx="85%" cy="60%" r="65%">
            <stop offset="0%" stop-color="#9d4edd" stop-opacity="0.5" />
            <stop offset="100%" stop-color="#000" stop-opacity="0" />
        </radialGradient>

        <filter id="fluid-blur" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
            <feGaussianBlur stdDeviation="85" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        
        <filter id="deep-blur" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="140" />
        </filter>
    </defs>

    <rect width="1920" height="1080" fill="url(#bg-grad)" />

    <circle cx="200" cy="400" r="800" fill="url(#teal-glow)" filter="url(#deep-blur)" />
    <circle cx="1700" cy="700" r="800" fill="url(#purple-glow)" filter="url(#deep-blur)" />

    <g filter="url(#fluid-blur)">
        <path d="M-100,600 Q350,150 950,400 T2000,150 L2100,1180 L-100,1180 Z" fill="url(#teal-wave-grad)" opacity="0.9" />

        <path d="M2020,150 C1450,80 1050,450 1250,700 C1450,950 850,1050 450,750 C150,500 350,950 -100,1050 L-100,1150 L2020,1150 Z" fill="url(#purple-teal-twist)" opacity="0.95" />

        <path d="M1200,-100 C800,250 600,150 350,450 C150,750 600,900 50,1100 L-100,1100 L-100,-100 Z" fill="url(#teal-wave-grad)" opacity="0.5" />
              
        <path d="M1920,250 C1350,350 1150,50 850,150 C550,250 350,0 0,50 L0,0 L1920,0 Z" fill="#00b4d8" opacity="0.25" style="mix-blend-mode: screen;" />
    </g>

    <rect width="1920" height="1080" fill="#fff" opacity="0.01" style="mix-blend-mode: overlay;" />
</svg>
